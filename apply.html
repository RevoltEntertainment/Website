<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now | Revolt Academy</title>
    <link rel="icon" type="image/png" href="images/aBRcFxAs_400x400.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #8a1c1c; 
            --input-bg: #121212;
            /* UPDATED FONT STACK */
            --font-main: "Noto Sans Georgian", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), url('images/academy-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color); 
            font-family: var(--font-main); 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(5, 5, 5, 0.98); position: fixed; width: 100%; height: var(--nav-height); top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo img { height: 30px; border-radius: 4px; }
        .logo span { color: var(--accent-color); }

        .nav-right { display: flex; gap: 20px; align-items: center; }
        
        .lang-btn {
            color: var(--accent-color);
            font-weight: 900;
            cursor: pointer;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .lang-btn:hover { background: #1a1a1a; border-color: var(--accent-color); }

        .form-container { 
            max-width: 550px; 
            margin: 120px auto 60px; 
            background: rgba(15, 15, 15, 0.98); 
            padding: 50px; 
            border-radius: 4px; 
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; text-align: center; font-weight: 900; }
        p.subtitle { text-align: center; color: #777; margin-bottom: 35px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 0.75rem; color: #555; text-transform: uppercase; margin-bottom: 8px; font-weight: 800; letter-spacing: 1px; }
        
        .form-control { 
            width: 100%; 
            padding: 16px; 
            background: var(--input-bg); 
            border: 1px solid #222; 
            color: #fff; 
            border-radius: 2px; 
            outline: none; 
            font-family: var(--font-main);
            font-size: 0.95rem;
            transition: 0.3s ease;
        }
        .form-control:focus { border-color: var(--accent-color); background: #1a1a1a; }

        select.form-control { cursor: pointer; color: #aaa; }
        select.form-control option { background: #121212; color: #fff; }

        .submit-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            font-weight: 900; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
            letter-spacing: 2px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .submit-btn:hover { background: #6b1515; transform: scale(1.01); }

        footer { margin-top: auto; background: #000; padding: 40px; text-align: center; border-top: 1px solid #111; font-size: 0.7rem; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="images/aBRcFxAs_400x400.png" alt="Revolt">
            Revolt <span>Academy</span>
        </a>
        <div class="nav-right">
            <a href="academy.html" class="tr" data-en="&larr; Back to Courses" data-ka="&larr; კურსებზე დაბრუნება" style="color: #888; text-decoration: none; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">&larr; Back to Courses</a>
            <div class="lang-btn" onclick="toggleLanguage()" id="lang-switcher">KA</div>
        </div>
    </nav>

    <div class="form-container">
        <h2 class="tr" data-en="Apply Now" data-ka="რეგისტრაცია">Apply Now</h2>
        <p class="subtitle tr" data-en="Join the Revolt Entertainment ecosystem" data-ka="შემოუერთდი Revolt Entertainment-ის ეკოსისტემას">Join the Revolt Entertainment ecosystem</p>
        
        <form action="https://formspree.io/f/xkowrgjg" method="POST">
            
            <div class="form-group">
                <label class="tr" data-en="Selected Discipline" data-ka="არჩეული მიმართულება">Selected Discipline</label>
                <select name="Course_Type" class="form-control" required>
                    <option value="" disabled selected class="tr" data-en="Select your course" data-ka="აირჩიეთ კურსი">Select your course</option>
                    <option value="3D Environment Art" class="tr" data-en="3D Environment Art (300 GEL/mo)" data-ka="3D გარემოს დიზაინი (300 ₾/თვე)">3D Environment Art (300 GEL/mo)</option>
                    <option value="Gameplay Programming" class="tr" data-en="Gameplay Programming (300 GEL/mo)" data-ka="გეიმფლეი პროგრამირება (300 ₾/თვე)">Gameplay Programming (300 GEL/mo)</option>
                    <option value="Animation" class="tr" data-en="Animation Course (300 GEL/mo)" data-ka="ანიმაციის კურსი (300 ₾/თვე)">Animation Course (300 GEL/mo)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="tr" data-en="Full Name" data-ka="სახელი და გვარი">Full Name</label>
                <input type="text" name="Student_Name" class="form-control tr-ph" 
                       placeholder="John Doe" 
                       data-en-ph="John Doe" 
                       data-ka-ph="სახელი გვარი" required>
            </div>

            <div class="form-group">
                <label class="tr" data-en="Contact Email" data-ka="ელ. ფოსტა">Contact Email</label>
                <input type="email" name="Student_Email" class="form-control tr-ph" 
                       placeholder="example@email.com" 
                       data-en-ph="example@email.com" 
                       data-ka-ph="example@email.com" required>
            </div>

            <div class="form-group">
                <label class="tr" data-en="Phone Number" data-ka="ტელეფონის ნომერი">Phone Number</label>
                <input type="tel" name="Student_Phone" class="form-control tr-ph" 
                       placeholder="+995 5__ ___ ___" 
                       data-en-ph="+995 5__ ___ ___" 
                       data-ka-ph="+995 5__ ___ ___" required>
            </div>

            <div class="form-group">
                <label class="tr" data-en="Personal Note (Optional)" data-ka="პირადი შენიშვნა (არასავალდებულო)">Personal Note (Optional)</label>
                <textarea name="Application_Message" class="form-control tr-ph" rows="4" 
                          placeholder="Tell us about your experience or goals..." 
                          data-en-ph="Tell us about your experience or goals..." 
                          data-ka-ph="მოგვიყევით თქვენი გამოცდილების ან მიზნების შესახებ..."></textarea>
            </div>

            <input type="hidden" name="_subject" value="New Academy Application - Revolt Entertainment">

            <button type="submit" class="submit-btn tr" data-en="Submit Application" data-ka="განაცხადის გაგზავნა">Submit Application</button>
        </form>
    </div>

    <footer>
        REVOLT ENTERTAINMENT &copy; 2025 | TBILISI, GEORGIA
    </footer>

    <script>
        // --- TRANSLATION LOGIC ---
        function toggleLanguage() {
            const btn = document.getElementById('lang-switcher');
            const currentLang = btn.innerText === "KA" ? "ka" : "en";
            
            // 1. Handle standard Text Elements
            document.querySelectorAll('.tr').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}`);
                if (text) el.innerHTML = text;
            });

            // 2. Handle Inputs with Placeholders
            document.querySelectorAll('.tr-ph').forEach(el => {
                const phText = el.getAttribute(`data-${currentLang}-ph`);
                if (phText) el.placeholder = phText;
            });

            btn.innerText = (currentLang === "ka") ? "EN" : "KA";
            localStorage.setItem('selected-lang', currentLang);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('selected-lang');
            if (savedLang === 'ka') {
                toggleLanguage();
            }
        });
    </script>
</body>
</html>
