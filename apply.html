<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now | Revolt Academy</title>
    <link rel="icon" type="image/png" href="images/aBRcFxAs_400x400.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #8a1c1c; 
            --input-bg: #121212;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('images/academy-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color); 
            font-family: var(--font-main); 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(5, 5, 5, 0.98); position: fixed; width: 100%; height: var(--nav-height); top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo img { height: 30px; border-radius: 4px; }
        .logo span { color: var(--accent-color); }

        .form-container { 
            max-width: 600px; 
            margin: 120px auto 60px; 
            background: rgba(15, 15, 15, 0.95); 
            padding: 40px; 
            border-radius: 8px; 
            border: 1px solid #222;
            backdrop-filter: blur(10px);
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; text-align: center; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #777; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
        
        .form-control { 
            width: 100%; 
            padding: 15px; 
            background: var(--input-bg); 
            border: 1px solid #222; 
            color: #fff; 
            border-radius: 4px; 
            outline: none; 
            font-family: var(--font-main);
            transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent-color); }

        select.form-control { cursor: pointer; appearance: none; }

        .submit-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #a32424; transform: translateY(-2px); }

        footer { margin-top: auto; background: #000; padding: 30px; text-align: center; border-top: 1px solid #111; font-size: 0.75rem; color: #444; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="images/aBRcFxAs_400x400.png" alt="Revolt">
            Revolt <span>Academy</span>
        </a>
        <a href="academy.html" style="color: #888; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Back</a>
    </nav>

    <div class="form-container">
        <h2>Course Registration</h2>
        <p class="subtitle">Fill out the form below and our team will contact you shortly.</p>
        
        <form action="https://formspree.io/f/xkowjegg" method="POST">
            <div class="form-group">
                <label>Select Course</label>
                <select name="course" class="form-control" required>
                    <option value="" disabled selected>Choose a course...</option>
                    <option value="3D Environment Art">3D Environment Art (300 GEL/mo)</option>
                    <option value="Gameplay Programming">Gameplay Programming (300 GEL/mo)</option>
                    <option value="Animation">Animation Course (300 GEL/mo)</option>
                    <option value="Kids Academy">Kids Academy (300 GEL/mo)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="+995 5xx xxx xxx" required>
            </div>

            <div class="form-group">
                <label>Why do you want to join?</label>
                <textarea name="message" class="form-control" rows="4" placeholder="Tell us a bit about your goals..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

    <footer>
        REVOLT ACADEMY &copy; 2025 | TBILISI, GEORGIA
    </footer>

</body>
</html>
